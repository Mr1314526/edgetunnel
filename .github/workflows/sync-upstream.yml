name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点（北京时间早上 8:00）自动执行
  workflow_dispatch:     # 保留手动触发功能

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 使用最新的 v6 版本，避免 Node.js 20 弃用警告
      - uses: actions/checkout@v6 
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync new commits from cmliu/edgetunnel
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
